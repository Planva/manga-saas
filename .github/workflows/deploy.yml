name: Deploy to Cloudflare Workers

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node (LTS)
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # ⛑ 兜底安装 pnpm，并把目录写入 PATH
      - name: Install pnpm (script)
        shell: bash
        run: |
          curl -fsSL https://get.pnpm.io/install.sh | env PNPM_VERSION=9.0.0 sh -
          echo "$HOME/.local/share/pnpm" >> "$GITHUB_PATH"
          echo "PNPM PATH added: $HOME/.local/share/pnpm"
          pnpm -v

      - name: Install deps
        shell: bash
        run: pnpm install --frozen-lockfile

      - name: Build (OpenNext)
        shell: bash
        run: pnpm build
        env:
          NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${{ vars.NEXT_PUBLIC_TURNSTILE_SITE_KEY }}

      - name: Publish Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy

      - name: Apply D1 migrations (remote)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          command: d1 migrations apply manga_saas_d1 --remote
