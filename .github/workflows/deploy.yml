name: Deploy to Cloudflare Workers

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 先装 Node（启用 corepack 缓存 pnpm）
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      # 安装 pnpm（两选一：推荐用 action；若喜欢 corepack 也可用下面注释的方式）
      - name: Setup PNPM
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false
      # - name: Enable corepack pnpm (alternative)
      #   run: |
      #     corepack enable
      #     corepack prepare pnpm@9 --activate
      #   shell: bash

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Build (OpenNext)
        run: pnpm build
        env:
          NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${{ vars.NEXT_PUBLIC_TURNSTILE_SITE_KEY }}

      - name: Publish Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          # wrangler 会读取 wrangler.jsonc，默认部署到 `name` 对应的 worker
          command: deploy

      - name: Apply D1 migrations (remote)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          command: d1 migrations apply manga_saas_d1 --remote
