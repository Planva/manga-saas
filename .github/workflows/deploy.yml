name: Deploy to Cloudflare Workers

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node (LTS)
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'                  # 允许基于 pnpm-lock.yaml 的缓存
          cache-dependency-path: 'pnpm-lock.yaml'

      - name: Show toolchain
        run: |
          node -v
          npm -v
          echo "npx will download pnpm on demand"

      # 🔑 关键：用 npx 临时执行 pnpm（无需预装 pnpm）
      - name: Install deps (pnpm via npx)
        run: npx -y pnpm@9 install --frozen-lockfile

      - name: Build (OpenNext) with pnpm via npx
        run: npx -y pnpm@9 build
        env:
          NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${{ vars.NEXT_PUBLIC_TURNSTILE_SITE_KEY }}

      - name: Publish Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy

      - name: Apply D1 migrations (remote)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          command: d1 migrations apply manga_saas_d1 --remote
